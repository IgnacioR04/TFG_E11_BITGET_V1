name: E11 XGBoost Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    env:
      BITGET_API_KEY: ${{ secrets.BITGET_API_KEY }}
      BITGET_API_SECRET: ${{ secrets.BITGET_API_SECRET }}
      BITGET_PASSPHRASE: ${{ secrets.BITGET_PASSPHRASE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run bot
        run: python bot.py

      - name: Commit and push data
        run: |
          git config user.name "e11-bot"
          git config user.email "e11-bot@noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main --ff-only || git reset --hard origin/main
          git add docs/data.json state.json
          git diff --cached --quiet || git commit -m "bot update"
          git push origin main
