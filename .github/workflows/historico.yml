name: Generar Historico

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"

jobs:
  historico:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pandas-ta --quiet

      - name: Run historico
        run: python generar_historico.py

      - name: Commit and push
        run: |
          git config user.name "e11-bot"
          git config user.email "e11-bot@noreply.github.com"
          git add docs/historical_trades.json
          git diff --cached --quiet || git commit -m "historico update"
          git push origin main
