name: E11 XGBoost Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    env:
      BITGET_API_KEY:    ${{ secrets.BITGET_API_KEY }}
      BITGET_API_SECRET: ${{ secrets.BITGET_API_SECRET }}
      BITGET_PASSPHRASE: ${{ secrets.BITGET_PASSPHRASE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run bot
        run: python bot.py

      - name: Commit and push data
        run: |
          git config user.name "e11-bot"
          git config user.email "e11-bot@noreply.github.com"
          git add docs/data.json state.json
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add docs/data.json state.json
          git diff --cached --quiet || git commit -m "bot: update [$(date -u '+%H:%M:%S UTC')]"
          git push

      - name: Trigger Pages deploy
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/static.yml/dispatches \
            -d '{"ref":"main"}'
